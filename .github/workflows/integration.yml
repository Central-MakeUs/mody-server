name: CI with Gradle

# main으로 가는 PR은 린트 + 테스트를 통과해야 한다.
on:
  pull_request:
    branches:
      - main

jobs:
  build_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and test
        run: |
          chmod +x ./gradlew
          ./gradlew build
