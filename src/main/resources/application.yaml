spring:
  application:
    name: mody
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jpa:
    open-in-view: false

token:
  access-secret: ${JWT_ACCESS_SECRET:mody-local-jwt-secret-key-must-be-at-least-32-bytes}
  access-token-expiration-time: ${JWT_ACCESS_TOKEN_EXPIRATION_TIME:3600000}
  refresh-token-expiration-time: ${JWT_REFRESH_TOKEN_EXPIRATION_TIME:1209600000}

id:
  epoch-second: ${ID_EPOCH_SECOND:1767225600}
  node-id: ${ID_NODE_ID:0}

challenge:
  step-master-data-initializer:
    enabled: ${CHALLENGE_STEP_MASTER_DATA_INITIALIZER_ENABLED:true}

upload:
  provider: ${UPLOAD_PROVIDER:local}
  gcp-bucket: ${GCP_STORAGE_BUCKET:}
  base-url: ${UPLOAD_BASE_URL:https://storage.example.com}
  presigned-url-expires-in-seconds: ${UPLOAD_PRESIGNED_URL_EXPIRES_IN_SECONDS:300}

notification:
  dispatch:
    enabled: ${NOTIFICATION_DISPATCH_ENABLED:false}
    fixed-delay-ms: ${NOTIFICATION_DISPATCH_FIXED_DELAY_MS:10000}
    batch-size: ${NOTIFICATION_DISPATCH_BATCH_SIZE:100}
    max-retry: ${NOTIFICATION_DISPATCH_MAX_RETRY:3}
  reminder:
    enabled: ${NOTIFICATION_REMINDER_ENABLED:false}
    cron: ${NOTIFICATION_REMINDER_CRON:0 * * * * *}
  retention:
    enabled: ${NOTIFICATION_RETENTION_ENABLED:false}
    cron: ${NOTIFICATION_RETENTION_CRON:0 0 4 * * *}
    retention-days: ${NOTIFICATION_RETENTION_DAYS:90}
    batch-size: ${NOTIFICATION_RETENTION_BATCH_SIZE:500}
  streak-risk:
    enabled: ${NOTIFICATION_STREAK_RISK_ENABLED:false}
    cron: ${NOTIFICATION_STREAK_RISK_CRON:0 0 21 * * *}
    batch-size: ${NOTIFICATION_STREAK_RISK_BATCH_SIZE:500}
  push:
    provider: ${NOTIFICATION_PUSH_PROVIDER:no-op}
    title: ${NOTIFICATION_PUSH_TITLE:Mody}

fcm:
  enabled: ${FCM_ENABLED:false}
  credentials-path: ${FCM_CREDENTIALS_PATH:}

oauth:
  kakao:
    authorization-uri: ${KAKAO_AUTHORIZATION_URI:https://kauth.kakao.com/oauth/authorize}
    auth-base-uri: ${KAKAO_AUTH_BASE_URI:https://kauth.kakao.com}
    api-base-uri: ${KAKAO_API_BASE_URI:https://kapi.kakao.com}
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_REDIRECT_URI:}
    scope: ${KAKAO_SCOPE:}
  google:
    authorization-uri: ${GOOGLE_AUTHORIZATION_URI:https://accounts.google.com/o/oauth2/v2/auth}
    auth-base-uri: ${GOOGLE_AUTH_BASE_URI:https://oauth2.googleapis.com}
    api-base-uri: ${GOOGLE_API_BASE_URI:https://www.googleapis.com}
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:}
    scope: ${GOOGLE_SCOPE:profile,email}
  apple:
    authorization-uri: ${APPLE_AUTHORIZATION_URI:https://appleid.apple.com/auth/authorize}
    auth-base-uri: ${APPLE_AUTH_BASE_URI:https://appleid.apple.com}
    api-base-uri: ${APPLE_API_BASE_URI:}
    client-id: ${APPLE_CLIENT_ID:com.jagsim.mody-dev}
    client-secret: ${APPLE_CLIENT_SECRET:}
    redirect-uri: ${APPLE_REDIRECT_URI:}
    scope: ${APPLE_SCOPE:email,name}
    identity-token:
      issuer: ${APPLE_ID_TOKEN_ISSUER:https://appleid.apple.com}
      audience: ${APPLE_BUNDLE_ID:com.jagsim.mody-dev}
      team-id: ${APPLE_TEAM_ID:BLRYMXGV5K}
      public-key-cache-ttl-seconds: ${APPLE_PUBLIC_KEY_CACHE_TTL_SECONDS:3600}

springdoc:
  swagger-ui:
    url: /docs/openapi3.json
    disable-swagger-default-url: true

---

spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/mody?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true

oauth:
  apple:
    client-id: ${APPLE_CLIENT_ID:com.jagsim.mody-dev}
    identity-token:
      audience: ${APPLE_BUNDLE_ID:com.jagsim.mody-dev}

---

spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: ${DB_URL:jdbc:mysql://mysql:3306/mody?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: false

oauth:
  apple:
    client-id: ${APPLE_CLIENT_ID:com.jagsim.mody-dev}
    identity-token:
      audience: ${APPLE_BUNDLE_ID:com.jagsim.mody-dev}

---

spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL:jdbc:mysql://mysql:3306/mody?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: false

oauth:
  apple:
    client-id: ${APPLE_CLIENT_ID:com.jagsim.mody}
    identity-token:
      audience: ${APPLE_BUNDLE_ID:com.jagsim.mody}
