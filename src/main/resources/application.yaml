spring:
  application:
    name: mody
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jpa:
    open-in-view: false

token:
  access-secret: ${JWT_ACCESS_SECRET:mody-local-jwt-secret-key-must-be-at-least-32-bytes}
  access-token-expiration-time: ${JWT_ACCESS_TOKEN_EXPIRATION_TIME:3600000}
  refresh-token-expiration-time: ${JWT_REFRESH_TOKEN_EXPIRATION_TIME:1209600000}

id:
  epoch-second: ${ID_EPOCH_SECOND:1767225600}
  node-id: ${ID_NODE_ID:1}

oauth:
  kakao:
    authorization-uri: ${KAKAO_AUTHORIZATION_URI:https://kauth.kakao.com/oauth/authorize}
    token-uri: ${KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
    user-info-uri: ${KAKAO_USER_INFO_URI:https://kapi.kakao.com/v2/user/me}
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_REDIRECT_URI:}
    scope: ${KAKAO_SCOPE:}
  google:
    authorization-uri: ${GOOGLE_AUTHORIZATION_URI:https://accounts.google.com/o/oauth2/v2/auth}
    token-uri: ${GOOGLE_TOKEN_URI:https://oauth2.googleapis.com/token}
    user-info-uri: ${GOOGLE_USER_INFO_URI:https://www.googleapis.com/oauth2/v2/userinfo}
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:}
    scope: ${GOOGLE_SCOPE:profile,email}
  apple:
    authorization-uri: ${APPLE_AUTHORIZATION_URI:https://appleid.apple.com/auth/authorize}
    token-uri: ${APPLE_TOKEN_URI:https://appleid.apple.com/auth/token}
    user-info-uri: ${APPLE_USER_INFO_URI:}
    client-id: ${APPLE_CLIENT_ID:}
    client-secret: ${APPLE_CLIENT_SECRET:}
    redirect-uri: ${APPLE_REDIRECT_URI:}
    scope: ${APPLE_SCOPE:email,name}

springdoc:
  swagger-ui:
    url: /docs/openapi3.json
    disable-swagger-default-url: true
