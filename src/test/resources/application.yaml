# 테스트 전용 설정. 인메모리 H2(MySQL 호환 모드)를 사용해 DB 없이 테스트한다.
spring:
  application:
    name: mody-test
  datasource:
    url: jdbc:h2:mem:mody;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false
  flyway:
    enabled: false

token:
  access-secret: test-jwt-secret-key-must-be-at-least-32-bytes
  access-token-expiration-time: 3600000
  refresh-token-expiration-time: 1209600000

id:
  epoch-second: 1767225600
  node-id: 1

upload:
  provider: local
  gcp-bucket: mody-test
  base-url: https://storage.example.com
  presigned-url-expires-in-seconds: 300

error-alert:
  slack:
    enabled: false
    webhook-url: ""
    max-message-length: 3500
    stack-trace-depth: 8

notification:
  dispatch:
    enabled: false
    fixed-delay-ms: 10000
    batch-size: 100
    max-retry: 3
  reminder:
    enabled: false
    cron: "0 * * * * *"
  retention:
    enabled: false
    cron: "0 0 4 * * *"
    retention-days: 90
    batch-size: 500
  streak-risk:
    enabled: false
    cron: "0 0 21 * * *"
    batch-size: 500
  push:
    provider: no-op
    title: Mody

fcm:
  enabled: false
  credentials-path: ""

demo-login:
  enabled: false
  android-provider-user-id: mody-android-reviewer
  ios-provider-user-id: mody-ios-reviewer
  android-nickname: AndroidReviewer
  ios-nickname: iOSReviewer

oauth:
  apple:
    auth-base-uri: https://appleid.apple.com
    client-id: com.jagsim.mody-dev
    identity-token:
      issuer: https://appleid.apple.com
      audience: com.jagsim.mody-dev
      team-id: BLRYMXGV5K
      public-key-cache-ttl-seconds: 3600
