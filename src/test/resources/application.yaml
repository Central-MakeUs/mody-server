# 테스트 전용 설정. 인메모리 H2(MySQL 호환 모드)를 사용해 DB 없이 테스트한다.
spring:
  datasource:
    url: jdbc:h2:mem:mody;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
